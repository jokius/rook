# Watch upstream (umputun/agterm) and tell us when it moves ahead of this fork.
#
# This fork is "upstream master + our patches on top" (see scripts/sync-upstream.sh). This workflow
# runs weekly, reports any new upstream commits in a single tracking issue, and dry-run rebases our
# patches onto them so we know up front whether the next sync is clean or conflicted. It never
# pushes or rewrites anything — syncing stays a deliberate local action.
name: upstream-sync

on:
  schedule:
    - cron: "0 9 * * 1" # Mondays, 09:00 UTC
  workflow_dispatch: # and on demand

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/umputun/agterm.git
          git fetch --quiet upstream master

      - name: What's new upstream?
        id: cmp
        run: |
          new=$(git rev-list --count HEAD..upstream/master)
          echo "new=$new" >> "$GITHUB_OUTPUT"
          {
            echo 'commits<<COMMITS_EOF'
            git log --oneline --no-decorate HEAD..upstream/master
            echo 'COMMITS_EOF'
          } >> "$GITHUB_OUTPUT"
          echo "upstream is $new commit(s) ahead"

      - name: Dry-run rebase (do our patches still apply?)
        id: rebase
        if: steps.cmp.outputs.new != '0'
        run: |
          git config user.name "upstream-sync"
          git config user.email "upstream-sync@users.noreply.github.com"
          if git rebase upstream/master >/dev/null 2>&1; then
            echo "status=clean" >> "$GITHUB_OUTPUT"
            echo "conflicts=" >> "$GITHUB_OUTPUT"
          else
            echo "status=conflicts" >> "$GITHUB_OUTPUT"
            {
              echo 'conflicts<<CONFLICTS_EOF'
              git diff --name-only --diff-filter=U
              echo 'CONFLICTS_EOF'
            } >> "$GITHUB_OUTPUT"
          fi
          git rebase --abort 2>/dev/null || true

      - name: Open or update the tracking issue
        if: steps.cmp.outputs.new != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          NEW: ${{ steps.cmp.outputs.new }}
          COMMITS: ${{ steps.cmp.outputs.commits }}
          STATUS: ${{ steps.rebase.outputs.status }}
          CONFLICTS: ${{ steps.rebase.outputs.conflicts }}
        run: |
          gh label create upstream-sync --color 0366d6 --description "Upstream has new commits" 2>/dev/null || true

          if [ "$STATUS" = "clean" ]; then
            verdict="✅ **Our patches rebase cleanly** onto the new upstream."
          else
            verdict=$(printf '⚠️ **Rebase hits conflicts** in:\n```\n%s\n```\n(`git rerere` may auto-resolve these locally — it replays past resolutions.)' "$CONFLICTS")
          fi

          body=$(printf 'Upstream (`umputun/agterm`) is **%s commit(s)** ahead of this fork.\n\n### New upstream commits\n```\n%s\n```\n\n### Rebase dry-run\n%s\n\n### To sync\n```sh\nscripts/sync-upstream.sh --dry-run   # inspect first\nscripts/sync-upstream.sh             # rebase our patches, run the gate, push the fork\n```\n' "$NEW" "$COMMITS" "$verdict")

          existing=$(gh issue list --label upstream-sync --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
            echo "commented on existing issue #$existing"
          else
            gh issue create --title "Upstream sync: $NEW new commit(s)" --body "$body" --label upstream-sync
          fi
